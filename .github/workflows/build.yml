name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS — JUCE + Qt
          - os: macos-latest
            name: macOS
            cmake-args: -DCMAKE_PREFIX_PATH=$(brew --prefix qt)
            install: brew install qt

          # Windows — JUCE + Qt
          - os: windows-latest
            name: Windows
            cmake-args: -DCMAKE_PREFIX_PATH=C:/Qt/6.8/msvc2022_64
            install: ""

          # Ubuntu — JUCE + Qt
          - os: ubuntu-latest
            name: Linux
            cmake-args: ""
            install: >-
              sudo apt-get update &&
              sudo apt-get install -y
              qt6-base-dev
              libasound2-dev
              libcurl4-openssl-dev
              libfreetype-dev
              libwebkit2gtk-4.1-dev
              libx11-dev
              libxcomposite-dev
              libxcursor-dev
              libxinerama-dev
              libxrandr-dev
              mesa-common-dev

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # Cache JUCE FetchContent download
      - name: Cache JUCE
        uses: actions/cache@v4
        with:
          path: build/_deps/juce-src
          key: juce-8.0.4

      # Cache CMake build directory (object files, intermediates)
      - name: Cache build
        uses: actions/cache@v4
        with:
          path: |
            build/_deps/juce-build
            build/core
            build/juce-app
            build/qt-app
          key: build-${{ matrix.name }}-${{ hashFiles('CMakeLists.txt', 'core/**', 'juce-app/**', 'qt-app/**') }}
          restore-keys: |
            build-${{ matrix.name }}-

      # Qt — install via aqtinstall on Windows (with built-in cache)
      - name: Install Qt (Windows)
        if: runner.os == 'Windows'
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.*"
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          dir: C:/Qt
          cache: true

      - name: Install dependencies
        if: matrix.install != ''
        shell: bash
        run: ${{ matrix.install }}

      - name: Configure
        shell: bash
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release ${{ matrix.cmake-args }}

      - name: Build
        run: cmake --build build --config Release

      - name: Find binaries
        id: bins
        shell: bash
        run: |
          # JUCE puts the binary under rawdger-juce_artefacts/
          find build/juce-app -type f \( -name "rawdger-juce" -o -name "rawdger-juce.exe" \) | head -1 | xargs -I{} echo "juce={}" >> "$GITHUB_OUTPUT"
          find build/qt-app -type f \( -name "rawdger-qt" -o -name "rawdger-qt.exe" \) | head -1 | xargs -I{} echo "qt={}" >> "$GITHUB_OUTPUT"

      - name: Upload JUCE artifact
        uses: actions/upload-artifact@v4
        with:
          name: rawdger-juce-${{ matrix.name }}
          path: ${{ steps.bins.outputs.juce }}
          if-no-files-found: warn

      - name: Upload Qt artifact
        uses: actions/upload-artifact@v4
        with:
          name: rawdger-qt-${{ matrix.name }}
          path: ${{ steps.bins.outputs.qt }}
          if-no-files-found: warn
