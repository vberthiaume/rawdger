name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS — JUCE + Qt
          - os: macos-latest
            name: macOS
            cmake-args: ""
            install: ""

          # Windows — JUCE + Qt
          - os: windows-latest
            name: Windows
            cmake-args: ""
            install: ""

          # Ubuntu — JUCE + Qt
          - os: ubuntu-latest
            name: Linux
            cmake-args: ""
            install: >-
              sudo apt-get update &&
              sudo apt-get install -y
              qt6-base-dev
              libasound2-dev
              libcurl4-openssl-dev
              libfreetype-dev
              libwebkit2gtk-4.1-dev
              libx11-dev
              libxcomposite-dev
              libxcursor-dev
              libxinerama-dev
              libxrandr-dev
              mesa-common-dev

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      # Cache JUCE source + juceaide (stable across builds, only changes with JUCE version)
      - name: Cache JUCE
        uses: actions/cache@v5
        with:
          path: |
            build/_deps/juce-src
            build/_deps/juce-build
            build/_deps/juce-subbuild
          key: juce-8.0.4-${{ matrix.name }}

      # Cache CMake build directory (object files, intermediates)
      - name: Cache build
        uses: actions/cache@v5
        with:
          path: |
            build/core
            build/juce-app
            build/qt-app
          key: build-${{ matrix.name }}-${{ hashFiles('CMakeLists.txt', 'core/**', 'juce-app/**', 'qt-app/**') }}
          restore-keys: |
            build-${{ matrix.name }}-

      # Qt — install via aqtinstall on Windows and macOS (with built-in cache)
      - name: Install Qt
        if: runner.os != 'Linux'
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.*"
          cache: true

      - name: Install dependencies
        if: matrix.install != ''
        shell: bash
        run: ${{ matrix.install }}

      - name: Configure
        shell: bash
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release ${{ matrix.cmake-args }}

      - name: Build
        run: cmake --build build --config Release

      - name: Stage artifacts
        shell: bash
        run: |
          mkdir -p staging/juce staging/qt

          # JUCE binary
          find build/juce-app -type f \( -name "rawdger-juce" -o -name "rawdger-juce.exe" \) | head -1 | xargs -I{} cp {} staging/juce/

          # Qt binary
          QT_BIN=$(find build/qt-app -type f \( -name "rawdger-qt" -o -name "rawdger-qt.exe" \) | head -1)
          cp "$QT_BIN" staging/qt/

      - name: Bundle Qt dependencies
        if: runner.os != 'Linux'
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            windeployqt --release --no-translations staging/qt/rawdger-qt.exe
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            mkdir -p staging/qt/lib
            cp -R "$QT_ROOT_DIR/lib/QtCore.framework" staging/qt/lib/
            install_name_tool -add_rpath @executable_path/lib staging/qt/rawdger-qt
          fi

      - name: Upload JUCE artifact
        uses: actions/upload-artifact@v7
        with:
          name: rawdger-juce-${{ matrix.name }}
          path: staging/juce/
          if-no-files-found: warn

      - name: Upload Qt artifact
        uses: actions/upload-artifact@v7
        with:
          name: rawdger-qt-${{ matrix.name }}
          path: staging/qt/
          if-no-files-found: warn
