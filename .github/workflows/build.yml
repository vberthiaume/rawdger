name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS — JUCE + Qt
          - os: macos-latest
            name: macOS
            cmake-args: -DCMAKE_PREFIX_PATH=$(brew --prefix qt)
            install: brew install qt

          # Windows — JUCE + Qt
          - os: windows-latest
            name: Windows
            cmake-args: -DCMAKE_PREFIX_PATH=C:/Qt/6.8/msvc2022_64
            install: ""

          # Ubuntu — JUCE + Qt
          - os: ubuntu-latest
            name: Linux
            cmake-args: ""
            install: >-
              sudo apt-get update &&
              sudo apt-get install -y
              qt6-base-dev
              libasound2-dev
              libcurl4-openssl-dev
              libfreetype-dev
              libwebkit2gtk-4.1-dev
              libx11-dev
              libxcomposite-dev
              libxcursor-dev
              libxinerama-dev
              libxrandr-dev
              mesa-common-dev

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # Qt — install via aqtinstall on Windows, package managers elsewhere
      - name: Install Qt (Windows)
        if: runner.os == 'Windows'
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.*"
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          dir: C:/Qt

      - name: Install dependencies
        if: matrix.install != ''
        shell: bash
        run: ${{ matrix.install }}

      - name: Configure
        shell: bash
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release ${{ matrix.cmake-args }}

      - name: Build
        run: cmake --build build --config Release

      - name: Upload JUCE artifact
        uses: actions/upload-artifact@v4
        with:
          name: rawdger-juce-${{ matrix.name }}
          path: |
            build/juce-app/rawdger-juce_artefacts/Release/**/*
            build/juce-app/Release/**/*
            build/juce-app/rawdger-juce_artefacts/**/*
          if-no-files-found: warn

      - name: Upload Qt artifact
        uses: actions/upload-artifact@v4
        with:
          name: rawdger-qt-${{ matrix.name }}
          path: |
            build/qt-app/Release/**/*
            build/qt-app/rawdger-qt
            build/qt-app/rawdger-qt.exe
          if-no-files-found: warn
