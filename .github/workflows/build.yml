name: Build

# Trigger: run this workflow on pushes to main and on pull requests targeting main.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    # strategy.matrix runs the job once per entry in the "include" list (3 times).
    strategy:
      # fail-fast: false means if one platform fails, the others keep running.
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macOS

          - os: windows-latest
            name: Windows

          - os: ubuntu-latest
            name: Linux

    # Display name for this job in the GitHub Actions UI.
    name: ${{ matrix.name }}
    # Which GitHub-hosted runner to use (set per matrix entry above).
    runs-on: ${{ matrix.os }}

    steps:
      # Check out the repository source code into the runner's workspace.
      - uses: actions/checkout@v5

      # Cache the JUCE source code (juce-src) and its build artifacts (juce-build),
      # which includes the juceaide helper tool that is slow to compile. The key is
      # fixed to the JUCE version + platform, so this cache only invalidates when we
      # bump the JUCE version. The _deps/ folder contains all content downloaded from
      # fetchcontent, so we can't just cache that whole folder under the juce version as key.
      - name: Cache JUCE
        uses: actions/cache@v5
        with:
          path: |
            build/_deps/juce-src
            build/_deps/juce-build
          key: juce-8.0.4-${{ matrix.name }}

      # Cache our project's compiled object files (.o / .obj).
      - name: Cache build
        uses: actions/cache@v5
        with:
          path: |
            build/core
            build/juce-app
            build/qt-app
          # This cache key includes a hash of all source files, so we'll have a cache miss if any of it is different
          key: build-${{ matrix.name }}-${{ hashFiles('CMakeLists.txt', 'core/**', 'juce-app/**', 'qt-app/**') }}
          # However the prefix of the key, ie, build-${{ matrix.name }}-, is used as a restore-keys, which means that
          # if we have a cache miss, this will restore the last cache that has this prefix. This puts the previous
          # run's .o files on disk, and then CMake only recompiles the ones whose source files changed.
          restore-keys: |
            build-${{ matrix.name }}-

      # Install and setup Qt using a third-party action that downloads prebuilt Qt binaries.
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.*"
          cache: true

      # Install system-level dev libraries that JUCE needs on Linux
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: >-   # The >- YAML operator joins these lines with spaces into a single string, allowing a readable multi-line command
          sudo apt-get update &&
          sudo apt-get install -y
          libgl1-mesa-dev
          libasound2-dev
          libcurl4-openssl-dev
          libfreetype-dev
          libwebkit2gtk-4.1-dev
          libx11-dev
          libxcomposite-dev
          libxcursor-dev
          libxinerama-dev
          libxrandr-dev
          mesa-common-dev

      # Run CMake configure: generates build files (Makefiles, Ninja, VS projects, etc.)
      # from our CMakeLists.txt. -B build puts all generated files in the build/ dir.
      # CMAKE_BUILD_TYPE=Release enables optimizations (only affects single-config
      # generators like Make/Ninja; Visual Studio ignores it and uses --config instead).
      - name: Configure
        shell: bash
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      # Run the actual compilation. --config Release is needed for multi-config
      # generators (Visual Studio on Windows) to select the Release configuration.
      # On Make/Ninja it's harmless (they use CMAKE_BUILD_TYPE from configure).
      - name: Build
        run: cmake --build build --config Release

      # Copy just the final executables into a clean staging/ directory.
      # This prevents CMake build artifacts (object files, Makefiles, etc.) from
      # ending up in the downloadable artifact.
      # find + xargs is used because the binary output path varies by platform
      # and generator (e.g., Release/ subfolder on Windows, rawdger-juce_artefacts/ for JUCE).
      - name: Stage artifacts
        shell: bash
        run: |
          mkdir -p staging/juce staging/qt

          # JUCE GUI app: on macOS it's a .app bundle (directory), elsewhere a plain executable
          JUCE_APP=$(find build/juce-app -name "*.app" -type d | head -1)
          if [[ -n "$JUCE_APP" ]]; then
            cp -R "$JUCE_APP" staging/juce/
          else
            find build/juce-app -type f \( -name "rawdger-juce" -o -name "rawdger-juce.exe" \) | head -1 | xargs -I{} cp {} staging/juce/
          fi

          # Qt app: plain executable on all platforms
          QT_BIN=$(find build/qt-app -type f \( -name "rawdger-qt" -o -name "rawdger-qt.exe" \) | head -1)
          cp "$QT_BIN" staging/qt/

      # Bundle Qt's shared libraries alongside the Qt executable so the artifact
      # is self-contained and runs without Qt installed on the target machine.
      # - Windows: windeployqt is a Qt-provided tool that copies all needed DLLs.
      # - macOS: we manually copy the framework dylibs (not headers/debug info) and
      #   use install_name_tool to add an rpath so the binary looks for frameworks
      #   relative to itself (@executable_path/lib/) instead of the CI runner's path.
      # - Linux: skipped — Linux Qt apps typically rely on system-installed Qt packages.
      - name: Bundle Qt dependencies
        if: runner.os != 'Linux'
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            windeployqt --release --no-translations staging/qt/rawdger-qt.exe
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            for fw in QtCore QtGui QtWidgets QtDBus; do
              if [ -d "$QT_ROOT_DIR/lib/${fw}.framework" ]; then
                mkdir -p "staging/qt/lib/${fw}.framework/Versions/A"
                cp "$QT_ROOT_DIR/lib/${fw}.framework/Versions/A/${fw}" "staging/qt/lib/${fw}.framework/Versions/A/"
                ln -s "Versions/A/${fw}" "staging/qt/lib/${fw}.framework/${fw}"
              fi
            done
            install_name_tool -add_rpath @executable_path/lib staging/qt/rawdger-qt
          fi

      # Ad-hoc codesign the macOS binaries. Without this, macOS's sandbox blocks
      # loading unsigned dylibs (you'd get "file system sandbox blocked open()").
      # --force --sign - applies an ad-hoc signature (no Apple Developer certificate).
      # --deep signs the .app bundle and everything inside it.
      # Framework dylibs must be signed before the executable that loads them.
      # Note: this does NOT prevent the Gatekeeper "unidentified developer" dialog
      # on downloaded files — that requires a paid Apple Developer certificate + notarization.
      - name: Codesign (macOS)
        if: runner.os == 'macOS'
        run: |
          # Sign the JUCE .app bundle (--deep signs the bundle and its contents)
          codesign --force --deep --sign - staging/juce/*.app

          # Sign Qt framework dylibs first, then the executable
          find staging/qt/lib -name "*.framework" -type d | while read fw; do
            name=$(basename "$fw" .framework)
            codesign --force --sign - "$fw/Versions/A/$name"
          done
          codesign --force --sign - staging/qt/rawdger-qt

      # Upload the JUCE binary as a downloadable artifact on the GitHub Actions run page.
      # if-no-files-found: warn means the step won't fail if the binary is missing
      # (e.g., if the build failed earlier) — it just logs a warning.
      - name: Upload JUCE artifact
        uses: actions/upload-artifact@v7
        with:
          name: rawdger-juce-${{ matrix.name }}
          path: staging/juce/
          if-no-files-found: warn

      # Upload the Qt binary (plus bundled DLLs/frameworks) as a downloadable artifact.
      - name: Upload Qt artifact
        uses: actions/upload-artifact@v7
        with:
          name: rawdger-qt-${{ matrix.name }}
          path: staging/qt/
          if-no-files-found: warn
