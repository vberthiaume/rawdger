name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS — JUCE + Qt
          - os: macos-latest
            name: macOS
            cmake-args: ""
            install: ""

          # Windows — JUCE + Qt
          - os: windows-latest
            name: Windows
            cmake-args: ""
            install: ""

          # Ubuntu — JUCE + Qt
          - os: ubuntu-latest
            name: Linux
            cmake-args: ""
            install: >-
              sudo apt-get update &&
              sudo apt-get install -y
              qt6-base-dev
              libasound2-dev
              libcurl4-openssl-dev
              libfreetype-dev
              libwebkit2gtk-4.1-dev
              libx11-dev
              libxcomposite-dev
              libxcursor-dev
              libxinerama-dev
              libxrandr-dev
              mesa-common-dev

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # Cache JUCE source + juceaide (stable across builds, only changes with JUCE version)
      - name: Cache JUCE
        uses: actions/cache@v4
        with:
          path: |
            build/_deps/juce-src
            build/_deps/juce-build
            build/_deps/juce-subbuild
          key: juce-8.0.4-${{ matrix.name }}

      # Cache CMake build directory (object files, intermediates)
      - name: Cache build
        uses: actions/cache@v4
        with:
          path: |
            build/core
            build/juce-app
            build/qt-app
          key: build-${{ matrix.name }}-${{ hashFiles('CMakeLists.txt', 'core/**', 'juce-app/**', 'qt-app/**') }}
          restore-keys: |
            build-${{ matrix.name }}-

      # Qt — install via aqtinstall on Windows and macOS (with built-in cache)
      - name: Install Qt
        if: runner.os != 'Linux'
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.*"
          cache: true

      - name: Install dependencies
        if: matrix.install != ''
        shell: bash
        run: ${{ matrix.install }}

      - name: Configure
        shell: bash
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release ${{ matrix.cmake-args }}

      - name: Build
        run: cmake --build build --config Release

      - name: Find binaries
        id: bins
        shell: bash
        run: |
          find build/juce-app -type f \( -name "rawdger-juce" -o -name "rawdger-juce.exe" \) | head -1 | xargs -I{} echo "juce={}" >> "$GITHUB_OUTPUT"
          QT_BIN=$(find build/qt-app -type f \( -name "rawdger-qt" -o -name "rawdger-qt.exe" \) | head -1)
          echo "qt=$QT_BIN" >> "$GITHUB_OUTPUT"
          echo "qt_dir=$(dirname "$QT_BIN")" >> "$GITHUB_OUTPUT"

      # Bundle Qt DLLs on Windows so the artifact is self-contained
      - name: Run windeployqt
        if: runner.os == 'Windows'
        shell: bash
        run: windeployqt --release --no-translations "${{ steps.bins.outputs.qt }}"

      - name: Upload JUCE artifact
        uses: actions/upload-artifact@v4
        with:
          name: rawdger-juce-${{ matrix.name }}
          path: ${{ steps.bins.outputs.juce }}
          if-no-files-found: warn

      - name: Upload Qt artifact
        uses: actions/upload-artifact@v4
        with:
          name: rawdger-qt-${{ matrix.name }}
          path: ${{ steps.bins.outputs.qt_dir }}
          if-no-files-found: warn
