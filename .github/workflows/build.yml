name: Build

# Trigger: run this workflow on pushes to main and on pull requests targeting main.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    # strategy.matrix runs the job once per entry in the "include" list (3 times).
    strategy:
      fail-fast: false          # keep going if one platform fails
      matrix:
        include:
          - os: macos-latest
            name: macOS

          - os: windows-latest
            name: Windows

          - os: ubuntu-latest
            name: Linux

    # Display name for this job in the GitHub Actions UI.
    name: ${{ matrix.name }}
    # Which GitHub-hosted runner to use (set per matrix entry above).
    runs-on: ${{ matrix.os }}

    steps:
      # Check out the repository source code into the runner's workspace.
      - uses: actions/checkout@v5

      # Cache the JUCE source code (juce-src) and its build artifacts (juce-build) which includes the juceaide
      # helper tool. The key is fixed to the JUCE version + platform, so this cache only invalidates when we
      # bump the JUCE version. The _deps/ folder contains all content downloaded from fetchcontent, so we
      # can't just cache that whole folder under the juce version as key.
      - name: Cache JUCE
        uses: actions/cache@v5
        with:
          path: |
            build/_deps/juce-src
            build/_deps/juce-build
          key: juce-8.0.4-${{ matrix.name }}

      # Cache our project's compiled object files (.o / .obj).
      - name: Cache build
        uses: actions/cache@v5
        with:
          path: |
            build/core
            build/juce-app
            build/qt-app
          # This cache key includes a hash of all source files, so we'll have a cache miss if any of it is different
          key: build-${{ matrix.name }}-${{ hashFiles('CMakeLists.txt', 'core/**', 'juce-app/**', 'qt-app/**') }}
          # However the prefix of the key, ie, build-${{ matrix.name }}-, is used as a restore-keys, which means that
          # if we have a cache miss, this will restore the last cache that has this prefix. This puts the previous
          # run's .o files on disk, and then CMake only recompiles the ones whose source files changed.
          restore-keys: |
            build-${{ matrix.name }}-

      # Install and setup Qt using a third-party action that downloads prebuilt Qt binaries.
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.*"
          cache: true

      # Install system-level dev libraries that JUCE needs on Linux
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: >-   # The >- YAML operator joins these lines with spaces into a single string, allowing a readable multi-line command
          sudo apt-get update &&
          sudo apt-get install -y
          libgl1-mesa-dev
          libasound2-dev
          libcurl4-openssl-dev
          libfreetype-dev
          libwebkit2gtk-4.1-dev
          libx11-dev
          libxcomposite-dev
          libxcursor-dev
          libxinerama-dev
          libxrandr-dev
          mesa-common-dev

      # Run CMake configure: generates build files (Makefiles, Ninja, VS projects, etc.)
      # from our CMakeLists.txt. -B build puts all generated files in the build/ dir.
      # CMAKE_BUILD_TYPE=Release enables optimizations (only affects single-config
      # generators like Make/Ninja; Visual Studio ignores it and uses --config instead).
      - name: Configure
        shell: bash
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      # Run the actual compilation. --config Release is needed for multi-config
      # generators (Visual Studio on Windows) to select the Release configuration.
      # On Make/Ninja it's harmless (they use CMAKE_BUILD_TYPE from configure).
      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build --output-on-failure --verbose -C Release

      # Copy the final app bundles/executables into a clean staging/ directory.
      # This prevents CMake build artifacts (object files, Makefiles, etc.) from
      # ending up in the downloadable artifact.
      # On macOS both apps are .app bundles. On Windows/Linux they are plain executables.
      # Note: JUCE names the binary after PRODUCT_NAME ("Rawdger JUCE"), not the
      # CMake target name ("rawdger-juce").
      - name: Stage artifacts
        shell: bash
        run: |
          mkdir -p staging/juce staging/qt

          if [[ "$RUNNER_OS" == "macOS" ]]; then
            cp -R "$(find build/juce-app -name '*.app' -type d | head -1)" staging/juce/
            cp -R "$(find build/qt-app -name '*.app' -type d | head -1)" staging/qt/
          else
            find build/juce-app -type f \( -name "Rawdger JUCE" -o -name "Rawdger JUCE.exe" \) | head -1 | xargs -I{} cp {} staging/juce/
            find build/qt-app -type f \( -name "rawdger-qt" -o -name "rawdger-qt.exe" \) | head -1 | xargs -I{} cp {} staging/qt/
          fi

      # Bundle Qt's shared libraries alongside the Qt executable so the artifact
      # is self-contained and runs without Qt installed on the target machine.
      # On mac and win we use the Qt deploy tools, e.g., https://doc.qt.io/qt-6/macos-deployment.html, 
      # and on linux we just relu on system-installed Qt packages
      - name: Bundle Qt dependencies
        if: runner.os != 'Linux'
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            windeployqt --release --no-translations staging/qt/rawdger-qt.exe
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            macdeployqt staging/qt/*.app
          fi

      # Ad-hoc codesign the macOS juce .app bundle, so I don't need to xattr -d hack it.
      # Sadly this doesn't work with qt, so I need to do something like `xattr -d com.apple.quarantine ./rawdger-qt.app/`
      - name: Codesign (macOS)
        if: runner.os == 'macOS'
        run: |
          codesign --force --deep --sign - staging/juce/*.app

      # Upload the artifacts on the GitHub Actions run page.
      # if-no-files-found: warn means the step won't fail if the binary is missing
      # (e.g., if the build failed earlier) — it just logs a warning.
      - name: Upload JUCE artifact
        uses: actions/upload-artifact@v7
        with:
          name: rawdger-juce-${{ matrix.name }}
          path: staging/juce/
          if-no-files-found: warn

      - name: Upload Qt artifact
        uses: actions/upload-artifact@v7
        with:
          name: rawdger-qt-${{ matrix.name }}
          path: staging/qt/
          if-no-files-found: warn

  sanitizers:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: AddressSanitizer
            c_flags:      "-fsanitize=address -fsanitize=undefined -fno-omit-frame-pointer -g"
            linker_flags: "-fsanitize=address -fsanitize=undefined"

          - name: UndefinedBehaviorSanitizer
            c_flags:      "-fsanitize=undefined -fno-sanitize-recover=undefined -fno-omit-frame-pointer -g"
            linker_flags: "-fsanitize=undefined"

          - name: ThreadSanitizer
            c_flags:      "-fsanitize=thread -fno-omit-frame-pointer -g"
            linker_flags: "-fsanitize=thread"

          - name: RealtimeSanitizer
            c_flags:      "-fsanitize=realtime"
            linker_flags: "-fsanitize=realtime"
            container: ghcr.io/guillaumeriousat/algogris-rtsan:latest

    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    container: ${{ matrix.container || '' }}
    env:
      UBSAN_OPTIONS: "halt_on_error=1:abort_on_error=1"

    steps:
      - uses: actions/checkout@v5

      - name: Configure
        run: >-
          cmake -B build
          -DCMAKE_BUILD_TYPE=Release
          -DRAWDGER_BUILD_JUCE=OFF
          -DRAWDGER_BUILD_QT=OFF
          -DCMAKE_C_FLAGS="${{ matrix.c_flags }}"
          -DCMAKE_CXX_FLAGS="${{ matrix.c_flags }}"
          -DCMAKE_EXE_LINKER_FLAGS="${{ matrix.linker_flags }}"
          -DCMAKE_SHARED_LINKER_FLAGS="${{ matrix.linker_flags }}"

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build --output-on-failure --verbose -C Release
